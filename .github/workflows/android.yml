name: Android CI

# Lint, unit-test, and build the debug APK for the Kotlin app. The APK is uploaded as a
# downloadable artifact (the "delivery" for a sideloaded app — there is no Play/CD path).
on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "app/**"
      - "gradle/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Separate steps so a failure names which gate broke (lint vs tests vs build),
      # rather than one combined invocation hiding the later results.
      - name: Lint
        run: ./gradlew :app:lintDebug

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
