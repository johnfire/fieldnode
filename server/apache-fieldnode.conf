# Apache vhost for the forwarder — reverse-proxies to the container on 127.0.0.1:8094.
#
# IMPORTANT: bind the explicit server IP (NOT *:port) if your Apache already has an IP-bound
# NameVirtualHost for that address — otherwise the request can fall through to that group's default
# vhost. Replace YOUR_VPS_IP and fieldnode.example.com below. Needs: a2enmod proxy proxy_http ssl rewrite.
#
# Deploy order: install the :80 block first → certbot --apache -d fieldnode.example.com to obtain the
# cert and generate the :443 block → ensure the ProxyPass lines are present in the :443 vhost.

<VirtualHost YOUR_VPS_IP:80>
    ServerName fieldnode.example.com

    ProxyPreserveHost On
    ProxyPass        /  http://127.0.0.1:8094/
    ProxyPassReverse /  http://127.0.0.1:8094/

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost YOUR_VPS_IP:443>
    ServerName fieldnode.example.com

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/fieldnode.example.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/fieldnode.example.com/privkey.pem

    ProxyPreserveHost On
    ProxyPass        /  http://127.0.0.1:8094/
    ProxyPassReverse /  http://127.0.0.1:8094/

    ErrorLog  ${APACHE_LOG_DIR}/fieldnode_error.log
    CustomLog ${APACHE_LOG_DIR}/fieldnode_access.log combined
</VirtualHost>
